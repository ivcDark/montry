name: montry

x-web-build: &web-build
  context: .
  dockerfile: docker/php/Dockerfile
  target: dev
  args:
    UID: ${UID:-1000}
    GID: ${GID:-1000}

x-web-env: &web-env
  volumes:
    - ./apps/web:/var/www/html:cached
  networks:
    - montry-net

x-poller-build: &poller-build
  context: ./apps/poller
  dockerfile: Dockerfile
  target: dev

x-poller-env: &poller-env
  env_file:
    - .env
  volumes:
    - ./apps/poller:/app:cached
  networks:
    - montry-net

services:
  nginx:
    image: nginx:latest
    container_name: montry-nginx
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - ./apps/web:/var/www/html:cached
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - montry-net

  web:
    build: *web-build
    container_name: montry-web
    <<: *web-env
    logging:
      driver: fluentd
      options:
        fluentd-address: "127.0.0.1:${OTEL_FLUENT_FORWARD_PORT:-8006}"
        fluentd-async: "true"
        tag: "montry.web"
    networks:
      - montry-net

  vite:
    image: node:22-alpine
    container_name: montry-node
    working_dir: /var/www/apps/web
    volumes:
      - .:/var/www
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    networks:
      - montry-net

#  web-scheduler:
#    build: *web-build
#    container_name: montry-web-scheduler
#    <<: *web-env
#    command: ["php", "artisan", "schedule:work"]
#    depends_on:
#      web:
#        condition: service_started
#      postgres:
#        condition: service_healthy
#      redis:
#        condition: service_healthy
#      rabbitmq:
#        condition: service_healthy
#    restart: unless-stopped

  web-queue:
    build: *web-build
    container_name: montry-web-queue
    <<: *web-env
    command: ["php", "artisan", "queue:work", "redis", "--queue=notifications,reports,default", "--sleep=1", "--tries=3", "--timeout=120", "--memory=256"]
    depends_on:
      web:
        condition: service_started
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

#  web-result-consumer:
#    build: *web-build
#    container_name: montry-web-result-consumer
#    <<: *web-env
#    command: ["php", "artisan", "checks:consume-results"]
#    depends_on:
#      web:
#        condition: service_started
#      postgres:
#        condition: service_healthy
#      rabbitmq:
#        condition: service_healthy
#    restart: unless-stopped
#
  poller:
    build: *poller-build
    container_name: montry-poller
    <<: *poller-env
    logging:
      driver: fluentd
      options:
        fluentd-address: "127.0.0.1:${OTEL_FLUENT_FORWARD_PORT:-8006}"
        fluentd-async: "true"
        tag: "montry.poller"
    command: ["go", "run", "./cmd/poller"]
    environment:
      POLLER_MODE: ${POLLER_MODE:-service}
      POLLER_HTTP_ADDR: ${POLLER_HTTP_ADDR:-:8090}
      POLLER_CONCURRENCY: ${POLLER_CONCURRENCY:-10}
      POLLER_WORKERS: ${POLLER_WORKERS:-10}
      POLLER_CHECK_TIMEOUT_SECONDS: ${POLLER_CHECK_TIMEOUT_SECONDS:-10}
      POLLER_QUEUE_BUFFER: ${POLLER_QUEUE_BUFFER:-100}
      POLLER_SHUTDOWN_TIMEOUT: ${POLLER_SHUTDOWN_TIMEOUT:-10s}
      LARAVEL_INTERNAL_API_URL: ${LARAVEL_INTERNAL_API_URL:-http://nginx}
      LARAVEL_INTERNAL_API_TOKEN: ${LARAVEL_INTERNAL_API_TOKEN:-}
      LARAVEL_INTERNAL_API_TIMEOUT_SECONDS: ${LARAVEL_INTERNAL_API_TIMEOUT_SECONDS:-10}
      POLLER_RESULT_RETRY_ATTEMPTS: ${POLLER_RESULT_RETRY_ATTEMPTS:-3}
      POLLER_RESULT_RETRY_DELAY_SECONDS: ${POLLER_RESULT_RETRY_DELAY_SECONDS:-1}
      POLLER_SCHEDULER_INTERVAL_SECONDS: ${POLLER_SCHEDULER_INTERVAL_SECONDS:-30}
      POLLER_FETCH_DUE_LIMIT: ${POLLER_FETCH_DUE_LIMIT:-100}
      POLLER_MANUAL_API_TOKEN: ${POLLER_MANUAL_API_TOKEN:-${POLLER_TOKEN:-}}
      POLLER_MANUAL_REQUEST_TIMEOUT_SECONDS: ${POLLER_MANUAL_REQUEST_TIMEOUT_SECONDS:-5}
      OTEL_TRACES_ENABLED: ${OTEL_TRACES_ENABLED:-true}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4318}
      OTEL_SERVICE_NAME: ${OTEL_POLLER_SERVICE_NAME:-montry-poller}
      SENTRY_ENABLED: ${SENTRY_ENABLED:-false}
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_POLLER_DSN: ${SENTRY_POLLER_DSN:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-local}
      SENTRY_RELEASE: ${SENTRY_RELEASE:-}
      SENTRY_FLUSH_TIMEOUT: ${SENTRY_FLUSH_TIMEOUT:-2s}
    ports:
      - "${POLLER_PORT:-8090}:8090"

  mock-laravel:
    build: *poller-build
    container_name: montry-mock-laravel
    <<: *poller-env
    command: ["go", "run", "./cmd/mock-laravel"]
    environment:
      MOCK_LARAVEL_ADDR: ":8081"
    ports:
      - "${MOCK_LARAVEL_PORT:-8081}:8081"
    profiles:
      - mock

  poller-mock:
    build: *poller-build
    container_name: montry-poller-mock
    <<: *poller-env
    command: ["go", "run", "./cmd/poller"]
    environment:
      POLLER_MODE: service
      POLLER_HTTP_ADDR: ":8090"
      POLLER_WORKERS: ${POLLER_WORKERS:-10}
      POLLER_CHECK_TIMEOUT_SECONDS: ${POLLER_CHECK_TIMEOUT_SECONDS:-10}
      POLLER_QUEUE_BUFFER: ${POLLER_QUEUE_BUFFER:-100}
      POLLER_SHUTDOWN_TIMEOUT: ${POLLER_SHUTDOWN_TIMEOUT:-10s}
      LARAVEL_INTERNAL_API_URL: http://mock-laravel:8081
      LARAVEL_INTERNAL_API_TOKEN: ""
      LARAVEL_INTERNAL_API_TIMEOUT_SECONDS: ${LARAVEL_INTERNAL_API_TIMEOUT_SECONDS:-10}
      POLLER_RESULT_RETRY_ATTEMPTS: ${POLLER_RESULT_RETRY_ATTEMPTS:-3}
      POLLER_RESULT_RETRY_DELAY_SECONDS: ${POLLER_RESULT_RETRY_DELAY_SECONDS:-1}
      POLLER_SCHEDULER_INTERVAL_SECONDS: ${POLLER_SCHEDULER_INTERVAL_SECONDS:-5}
      POLLER_FETCH_DUE_LIMIT: ${POLLER_FETCH_DUE_LIMIT:-100}
      POLLER_MANUAL_API_TOKEN: ""
      POLLER_MANUAL_REQUEST_TIMEOUT_SECONDS: ${POLLER_MANUAL_REQUEST_TIMEOUT_SECONDS:-5}
      OTEL_TRACES_ENABLED: ${OTEL_TRACES_ENABLED:-true}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4318}
      OTEL_SERVICE_NAME: ${OTEL_POLLER_SERVICE_NAME:-montry-poller}
      SENTRY_ENABLED: ${SENTRY_ENABLED:-false}
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_POLLER_DSN: ${SENTRY_POLLER_DSN:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-local}
      SENTRY_RELEASE: ${SENTRY_RELEASE:-}
      SENTRY_FLUSH_TIMEOUT: ${SENTRY_FLUSH_TIMEOUT:-2s}
    ports:
      - "${POLLER_MOCK_PORT:-8091}:8090"
    profiles:
      - mock

