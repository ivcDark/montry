  poller:
    build: *poller-build
    container_name: montri-poller
    <<: *poller-env
    command: ["go", "run", "./cmd/poller"]
    environment:
      POLLER_MODE: ${POLLER_MODE:-service}
      POLLER_HTTP_ADDR: ${POLLER_HTTP_ADDR:-:8090}
      POLLER_CONCURRENCY: ${POLLER_CONCURRENCY:-10}
      POLLER_WORKERS: ${POLLER_WORKERS:-10}
      POLLER_CHECK_TIMEOUT_SECONDS: ${POLLER_CHECK_TIMEOUT_SECONDS:-10}
      POLLER_QUEUE_BUFFER: ${POLLER_QUEUE_BUFFER:-100}
      POLLER_SHUTDOWN_TIMEOUT: ${POLLER_SHUTDOWN_TIMEOUT:-10s}
      LARAVEL_INTERNAL_API_URL: ${LARAVEL_INTERNAL_API_URL:-http://nginx}
      LARAVEL_INTERNAL_API_TOKEN: ${LARAVEL_INTERNAL_API_TOKEN:-}
      LARAVEL_INTERNAL_API_TIMEOUT_SECONDS: ${LARAVEL_INTERNAL_API_TIMEOUT_SECONDS:-10}
      POLLER_RESULT_RETRY_ATTEMPTS: ${POLLER_RESULT_RETRY_ATTEMPTS:-3}
      POLLER_RESULT_RETRY_DELAY_SECONDS: ${POLLER_RESULT_RETRY_DELAY_SECONDS:-1}
      POLLER_SCHEDULER_INTERVAL_SECONDS: ${POLLER_SCHEDULER_INTERVAL_SECONDS:-30}
      POLLER_FETCH_DUE_LIMIT: ${POLLER_FETCH_DUE_LIMIT:-100}
      POLLER_MANUAL_API_TOKEN: ${POLLER_MANUAL_API_TOKEN:-${POLLER_TOKEN:-}}
      POLLER_MANUAL_REQUEST_TIMEOUT_SECONDS: ${POLLER_MANUAL_REQUEST_TIMEOUT_SECONDS:-5}
    ports:
      - "${POLLER_PORT:-8090}:8090"
    restart: unless-stopped

  mock-laravel:
    build: *poller-build
    container_name: montri-mock-laravel
    <<: *poller-env
    command: ["go", "run", "./cmd/mock-laravel"]
    environment:
      MOCK_LARAVEL_ADDR: ":8081"
    ports:
      - "${MOCK_LARAVEL_PORT:-8081}:8081"
    profiles:
      - mock

  poller-mock:
    build: *poller-build
    container_name: montri-poller-mock
    <<: *poller-env
    command: ["go", "run", "./cmd/poller"]
    environment:
      POLLER_MODE: service
      POLLER_HTTP_ADDR: ":8090"
      POLLER_WORKERS: ${POLLER_WORKERS:-10}
      POLLER_CHECK_TIMEOUT_SECONDS: ${POLLER_CHECK_TIMEOUT_SECONDS:-10}
      POLLER_QUEUE_BUFFER: ${POLLER_QUEUE_BUFFER:-100}
      POLLER_SHUTDOWN_TIMEOUT: ${POLLER_SHUTDOWN_TIMEOUT:-10s}
      LARAVEL_INTERNAL_API_URL: http://mock-laravel:8081
      LARAVEL_INTERNAL_API_TOKEN: ""
      LARAVEL_INTERNAL_API_TIMEOUT_SECONDS: ${LARAVEL_INTERNAL_API_TIMEOUT_SECONDS:-10}
      POLLER_RESULT_RETRY_ATTEMPTS: ${POLLER_RESULT_RETRY_ATTEMPTS:-3}
      POLLER_RESULT_RETRY_DELAY_SECONDS: ${POLLER_RESULT_RETRY_DELAY_SECONDS:-1}
      POLLER_SCHEDULER_INTERVAL_SECONDS: ${POLLER_SCHEDULER_INTERVAL_SECONDS:-5}
      POLLER_FETCH_DUE_LIMIT: ${POLLER_FETCH_DUE_LIMIT:-100}
      POLLER_MANUAL_API_TOKEN: ""
      POLLER_MANUAL_REQUEST_TIMEOUT_SECONDS: ${POLLER_MANUAL_REQUEST_TIMEOUT_SECONDS:-5}
    ports:
      - "${POLLER_MOCK_PORT:-8091}:8090"
    depends_on:
      - mock-laravel
    profiles:
      - mock

