  postgres:
    image: postgres:latest
    container_name: montri-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-montri}
      POSTGRES_USER: ${POSTGRES_USER:-montri}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-montri}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-montri} -d ${POSTGRES_DB:-montri}" ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    restart: unless-stopped
    networks:
      - montri-net

  redis:
    image: redis:latest
    container_name: montri-redis
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
      - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped
    networks:
      - montri-net

