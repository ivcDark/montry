name: montri

x-web-build: &web-build
  context: .
  dockerfile: docker/php/Dockerfile
  target: dev
  args:
    UID: ${UID:-1000}
    GID: ${GID:-1000}

x-web-env: &web-env
  volumes:
    - ./apps/web:/var/www/html:cached
  networks:
    - montri-net

x-poller-build: &poller-build
  context: ./apps/poller
  dockerfile: Dockerfile
  target: dev

x-poller-env: &poller-env
  env_file:
    - .env
  volumes:
    - ./apps/poller:/app:cached
  networks:
    - montri-net

services:
  nginx:
    image: nginx:latest
    container_name: montri-nginx
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - ./apps/web:/var/www/html:cached
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
    restart: unless-stopped
    networks:
      - montri-net

  web:
    build: *web-build
    container_name: montri-web
    <<: *web-env
    restart: unless-stopped
    networks:
      - montri-net

  vite:
    image: node:22-alpine
    container_name: montri-node
    working_dir: /var/www/apps/web
    volumes:
      - .:/var/www
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    networks:
      - montri-net

