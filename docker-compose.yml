  postgres:
    image: postgres:latest
    container_name: montry-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-montry}
      POSTGRES_USER: ${POSTGRES_USER:-montry}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-montry}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-montry} -d ${POSTGRES_DB:-montry}" ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    networks:
      - montry-net

  redis:
    image: redis:latest
    container_name: montry-redis
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
      - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - montry-net

